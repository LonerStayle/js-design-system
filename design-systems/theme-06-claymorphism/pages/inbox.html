<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
/* 다크 사용자 라이트 플래시 방지 — 스타일 로드 전에 테마를 선적용. 키는 app.js 와 동일(clay-theme). */
(function () {
  try {
    var t = localStorage.getItem("clay-theme");
    if (!t) t = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    document.documentElement.setAttribute("data-theme", t);
  } catch (e) {}
})();
</script>
<title>이메일 인박스 · Claymorphism — theme-06</title>
<meta name="description" content="말랑한 클레이모피즘 3패널 이메일 인박스 데모 — 폴더 사이드바, 메시지 리스트, 리딩 페인.">
<link rel="stylesheet" href="../theme.css">
<style>
  /* ===== inbox 전용 데모 레이아웃 (디자인 시스템 외부 헬퍼) ===== */
  .mail-shell {
    display: grid;
    grid-template-columns: 17rem minmax(20rem, 1fr) minmax(24rem, 1.5fr);
    gap: var(--space-5);
    align-items: start;
    height: calc(100vh - 9rem);
    min-height: 32rem;
  }
  .mail-panel {
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: var(--space-4);
  }
  .mail-panel--scroll { overflow-y: auto; }

  /* 폴더 사이드바 */
  .mail-side { gap: var(--space-3); }
  .mail-side .sidebar { background: none; box-shadow: none; padding: 0; border: 0; height: 100%; display: flex; flex-direction: column; }
  .label-dot {
    width: .8rem; height: .8rem; border-radius: var(--radius-full);
    flex-shrink: 0; box-shadow: var(--clay-cast);
  }

  /* 메시지 리스트 */
  .mail-toolbar { display: flex; align-items: center; gap: var(--space-2); flex-wrap: wrap; }
  .mail-list { overflow-y: auto; flex: 1; margin-inline: calc(var(--space-2) * -1); padding-inline: var(--space-2); }
  .mail-item { cursor: pointer; align-items: flex-start; }
  .mail-item .list__title { display: flex; align-items: center; gap: var(--space-2); }
  .mail-item .subject { font-weight: var(--weight-bold, 700); }
  .mail-item.is-unread .sender { font-weight: var(--weight-extrabold, 800); }
  .mail-item.is-unread .subject { font-weight: var(--weight-extrabold, 800); color: var(--color-text); }
  .mail-item:not(.is-unread) .sender,
  .mail-item:not(.is-unread) .subject { color: var(--color-text-muted); }
  .unread-dot {
    width: .55rem; height: .55rem; border-radius: var(--radius-full);
    background: var(--color-primary); flex-shrink: 0;
    box-shadow: var(--clay-glow);
  }
  .mail-item:not(.is-unread) .unread-dot { visibility: hidden; }
  .mail-meta-icons { display: inline-flex; gap: var(--space-1); align-items: center; }
  .mail-meta-icons .icon { width: .95rem; height: .95rem; }
  .icon-star-on { color: var(--yellow-500); fill: var(--yellow-400); }
  .icon-pin { color: var(--color-primary); }

  /* 고정된 메일 — 목록 맨 위, 살짝 다른 표면으로 구분 */
  .mail-list__section { padding: var(--space-2) var(--space-2) var(--space-1); font-size: var(--text-2xs);
    font-weight: var(--weight-extrabold); color: var(--color-text-subtle); letter-spacing: var(--tracking-caps-ko);
    display: flex; align-items: center; gap: var(--space-1); }
  .mail-list__section .icon { width: .85rem; height: .85rem; }
  .mail-item.is-pinned { background: var(--color-primary-soft); border-radius: var(--radius-md); }

  /* 빈 폴더 상태 — 리스트 안에서 말랑이가 안내 */
  .mail-list-empty { flex: 1; display: grid; place-items: center; padding: var(--space-6); }
  .reading__empty-wrap .mascot,
  .mail-list-empty .mascot { --mascot-size: 6rem; }

  /* 리딩 페인 */
  .reading { gap: var(--space-4); }
  .reading__header { display: flex; flex-direction: column; gap: var(--space-3); }
  .reading__from { display: flex; align-items: center; gap: var(--space-3); }
  .reading__body { flex: 1; overflow-y: auto; line-height: 1.75; padding-right: var(--space-1); }
  .reading__body p { margin-bottom: var(--space-4); color: var(--color-text); }
  .reply-box { flex-shrink: 0; }
  .reading__empty-wrap { flex: 1; display: grid; place-items: center; }

  /* 모바일 토글용 (디폴트 데스크탑은 둘 다 표시) */
  .mail-back-btn { display: none; }

  @media (max-width: 980px) {
    .mail-shell { grid-template-columns: 16rem minmax(18rem, 1fr); }
    .mail-side { display: none; }
    .mail-shell { grid-template-columns: minmax(18rem, 1fr) minmax(22rem, 1.4fr); }
  }
  @media (max-width: 768px) {
    .mail-shell {
      display: block;
      height: auto;
      min-height: 0;
    }
    .mail-panel { height: auto; max-height: none; }
    .mail-side { display: none; }
    /* 모바일: 리스트만 보이고, 메일 선택 시 리딩만 보이게 토글 */
    body[data-mail-view="reading"] .mail-mid { display: none; }
    body:not([data-mail-view="reading"]) .mail-read { display: none; }
    .mail-list { max-height: none; }
    .reading__body { max-height: 40vh; }
    .mail-back-btn { display: inline-flex; }
  }

  @media (prefers-reduced-motion: no-preference) {
    .mail-item { transition: transform .12s var(--ease-out, ease); }
  }
</style>
</head>
<body>
<a href="#main" class="skip-link">본문으로 건너뛰기</a>

<!-- ========================= 새 메일 작성 모달 ========================= -->
<div class="overlay" id="compose" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="compose-title">
  <div class="modal" role="document">
    <div class="modal__header">
      <h2 class="modal__title" id="compose-title">새 메일 작성</h2>
      <button class="modal__close" data-close aria-label="닫기"><svg class="icon" viewBox="0 0 24 24"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button>
    </div>
    <div class="modal__body stack">
      <div class="field">
        <label class="field__label" for="c-to">받는 사람</label>
        <input class="input" id="c-to" type="email" placeholder="someone@clay.ui" value="team@clay.ui">
      </div>
      <div class="field">
        <label class="field__label" for="c-subject">제목</label>
        <input class="input" id="c-subject" placeholder="제목을 입력하세요">
      </div>
      <div class="field">
        <label class="field__label" for="c-body">내용</label>
        <textarea class="textarea" id="c-body" rows="6" placeholder="말랑하게 적어보세요…"></textarea>
      </div>
    </div>
    <div class="modal__footer">
      <button class="btn btn-ghost" data-close>취소</button>
      <button class="btn btn-primary" data-close data-toast data-toast-title="전송됨" data-toast-text="메일이 발송되었어요." data-toast-variant="success">
        <svg class="icon" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        보내기
      </button>
    </div>
  </div>
</div>

<!-- ========================= 상단 바 ========================= -->
<div class="container-wide" style="padding-top:var(--space-4); padding-bottom:var(--space-3)">
  <nav class="navbar" aria-label="주요">
    <a class="navbar__brand" href="../index.html">
      <span class="logo"><svg class="icon" viewBox="0 0 24 24" style="stroke-width:2.6"><path d="M12 2a4 4 0 0 1 4 4c2 0 4 2 4 4a4 4 0 0 1-1 7H7a4 4 0 0 1-1-7c0-2 2-4 4-4a4 4 0 0 1 4-4Z"/></svg></span>
      <span>Clay<span style="color:var(--color-primary)">UI</span></span>
    </a>
    <div class="navbar__nav hide-mobile">
      <span class="nav-link is-active">이메일 인박스</span>
    </div>
    <div class="navbar__actions">
      <a class="btn btn-secondary btn-sm" href="../index.html">
        <svg class="icon" viewBox="0 0 24 24"><polyline points="15 6 9 12 15 18"/></svg>
        <span class="hide-mobile">허브로</span>
      </a>
      <button class="btn-icon btn btn-secondary" data-theme-toggle aria-label="테마 전환" aria-pressed="false">
        <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5 19 19M19 5l-1.5 1.5M6.5 17.5 5 19"/></svg>
      </button>
    </div>
  </nav>
</div>

<main id="main" class="container-wide" style="padding-bottom:var(--space-5)">
  <div class="mail-shell">

    <!-- ======= 1. 폴더 사이드바 ======= -->
    <aside class="mail-panel mail-side clay" aria-label="폴더 및 라벨">
      <nav class="sidebar" aria-label="메일 폴더">
        <a class="sidebar__brand" href="../index.html" aria-label="허브로 돌아가기">
          <span class="logo"><svg class="icon" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="3"/><polyline points="4 7 12 13 20 7"/></svg></span>
          <span>Clay 메일</span>
        </a>

        <button class="btn btn-primary btn-block" data-open="#compose" style="margin-block:var(--space-3)">
          <svg class="icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
          새 메일
        </button>

        <div class="sidebar__section">폴더</div>
        <a class="sidebar__item is-active" href="#main" data-folder="inbox">
          <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="3"/><polyline points="4 7 12 13 20 7"/></svg>
          <span class="sidebar__label">받은편지함</span>
          <span class="badge-count" data-inbox-count>6</span>
        </a>
        <a class="sidebar__item" href="#main" data-folder="starred">
          <svg class="icon" viewBox="0 0 24 24"><polygon points="12 3 14.9 9 21.5 9.7 16.5 14.2 18 20.8 12 17.4 6 20.8 7.5 14.2 2.5 9.7 9.1 9"/></svg>
          <span class="sidebar__label">별표</span>
          <span class="badge-count">3</span>
        </a>
        <a class="sidebar__item" href="#main" data-folder="sent">
          <svg class="icon" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          <span class="sidebar__label">보낸편지함</span>
        </a>
        <a class="sidebar__item" href="#main" data-folder="draft">
          <svg class="icon" viewBox="0 0 24 24"><path d="M11 4H4v16h16v-7"/><path d="M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4Z"/></svg>
          <span class="sidebar__label">임시보관</span>
          <span class="badge-count">2</span>
        </a>
        <a class="sidebar__item" href="#main" data-folder="spam">
          <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="13"/><circle cx="12" cy="16.5" r="0.5" fill="currentColor"/></svg>
          <span class="sidebar__label">스팸</span>
          <span class="badge-count">11</span>
        </a>
        <a class="sidebar__item" href="#main" data-folder="trash">
          <svg class="icon" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6 18 20a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
          <span class="sidebar__label">휴지통</span>
        </a>

        <div class="sidebar__section">라벨</div>
        <a class="sidebar__item" href="#main">
          <span class="label-dot" style="background:var(--coral-400)"></span>
          <span class="sidebar__label">업무</span>
        </a>
        <a class="sidebar__item" href="#main">
          <span class="label-dot" style="background:var(--mint-400)"></span>
          <span class="sidebar__label">개인</span>
        </a>
        <a class="sidebar__item" href="#main">
          <span class="label-dot" style="background:var(--violet-400)"></span>
          <span class="sidebar__label">청구서</span>
        </a>
        <a class="sidebar__item" href="#main">
          <span class="label-dot" style="background:var(--yellow-400)"></span>
          <span class="sidebar__label">여행</span>
        </a>

        <div style="margin-top:auto; padding-top:var(--space-4)">
          <div class="cluster" style="gap:var(--space-2)">
            <div class="avatar avatar--sm avatar--coral">나</div>
            <div class="truncate">
              <div class="text-sm fw-bold truncate">김지수</div>
              <div class="text-2xs text-subtle truncate">jisu@clay.ui</div>
            </div>
          </div>
        </div>
      </nav>
    </aside>

    <!-- ======= 2. 메시지 리스트 ======= -->
    <section class="mail-panel mail-mid clay" aria-label="메일 목록">
      <div class="stack-sm" style="flex-shrink:0">
        <div class="search">
          <svg class="icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
          <input type="search" placeholder="메일 검색…" aria-label="메일 검색">
        </div>
        <div class="mail-toolbar">
          <label class="checkbox" title="모두 선택">
            <input type="checkbox" data-select-all aria-label="모두 선택">
            <span class="checkbox__box"><svg class="icon" viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></span>
          </label>
          <button class="btn-icon btn btn-ghost btn-sm" aria-label="보관" data-toast data-toast-title="보관됨" data-toast-text="선택한 메일을 보관했어요.">
            <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="4" rx="1"/><path d="M5 8v11a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V8"/></svg>
          </button>
          <button class="btn-icon btn btn-ghost btn-sm" aria-label="삭제" data-toast data-toast-title="삭제됨" data-toast-text="휴지통으로 이동했어요." data-toast-variant="danger">
            <svg class="icon" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6 18 20a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
          </button>
          <button class="btn-icon btn btn-ghost btn-sm" aria-label="새로고침" data-toast data-toast-title="새로고침" data-toast-text="받은편지함이 최신 상태예요.">
            <svg class="icon" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7"/><polyline points="21 4 21 9 16 9"/></svg>
          </button>
          <div class="dropdown" style="margin-left:auto">
            <button class="btn btn-ghost btn-sm" data-dropdown-toggle aria-haspopup="true" aria-expanded="false">
              정렬 <svg class="icon" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="menu dropdown__menu" role="menu">
              <button class="menu__item" role="menuitem">최신순</button>
              <button class="menu__item" role="menuitem">오래된순</button>
              <button class="menu__item" role="menuitem">읽지 않음 먼저</button>
              <button class="menu__item" role="menuitem">보낸 사람</button>
            </div>
          </div>
        </div>
      </div>

      <ul class="list list--flush mail-list" data-mail-list role="listbox" aria-label="메일">
        <!-- 메일 항목은 JS 로 렌더 -->
      </ul>
    </section>

    <!-- ======= 3. 리딩 페인 ======= -->
    <section class="mail-panel mail-read reading clay" aria-label="메일 내용" aria-live="polite">
      <!-- 빈 상태 — 말랑이가 쿨쿨 기다리는 중 -->
      <div class="reading__empty-wrap" data-reading-empty>
        <div class="empty">
          <figure class="mascot mascot--sleep mascot--sky mascot--float" aria-hidden="true">
            <span class="mascot__eye mascot__eye--l"></span><span class="mascot__eye mascot__eye--r"></span>
            <span class="mascot__cheek mascot__cheek--l"></span><span class="mascot__cheek mascot__cheek--r"></span>
            <span class="mascot__mouth"></span>
          </figure>
          <div class="empty__title">메일을 선택하세요</div>
          <div class="empty__text">왼쪽 목록에서 메일을 고르면 여기에 내용이 펼쳐져요.</div>
        </div>
      </div>

      <!-- 실제 메일 (JS 가 채움) -->
      <article data-reading hidden style="display:flex; flex-direction:column; gap:var(--space-4); height:100%">
        <button class="btn btn-ghost btn-sm mail-back-btn shrink-0" data-mail-back style="align-self:flex-start">
          <svg class="icon" viewBox="0 0 24 24"><polyline points="15 6 9 12 15 18"/></svg> 목록으로
        </button>

        <header class="reading__header shrink-0">
          <h2 class="text-2xl fw-extrabold" data-r-subject>제목</h2>
          <div class="flex items-center justify-between gap-3" style="flex-wrap:wrap">
            <div class="reading__from">
              <div class="avatar" data-r-avatar>?</div>
              <div>
                <div class="fw-bold" data-r-sender>보낸 사람</div>
                <div class="text-sm text-muted" data-r-email>email@clay.ui</div>
              </div>
            </div>
            <div class="cluster" style="gap:var(--space-2)">
              <span class="text-sm text-subtle" data-r-time>방금</span>
              <button class="btn-icon btn btn-ghost btn-sm" aria-label="별표" data-toast data-toast-title="별표 표시" data-toast-text="중요 메일로 표시했어요.">
                <svg class="icon" viewBox="0 0 24 24"><polygon points="12 3 14.9 9 21.5 9.7 16.5 14.2 18 20.8 12 17.4 6 20.8 7.5 14.2 2.5 9.7 9.1 9"/></svg>
              </button>
              <button class="btn-icon btn btn-ghost btn-sm" aria-label="답장" data-toast data-toast-title="답장" data-toast-text="아래 빠른 답장 칸을 이용하세요.">
                <svg class="icon" viewBox="0 0 24 24"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg>
              </button>
              <button class="btn-icon btn btn-ghost btn-sm" aria-label="보관" data-toast data-toast-title="보관됨" data-toast-text="메일을 보관했어요.">
                <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="4" rx="1"/><path d="M5 8v11a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V8"/></svg>
              </button>
              <button class="btn-icon btn btn-ghost btn-sm" aria-label="삭제" data-toast data-toast-title="삭제됨" data-toast-text="휴지통으로 이동했어요." data-toast-variant="danger">
                <svg class="icon" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6 18 20a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
              </button>
            </div>
          </div>
        </header>

        <div class="reading__body" data-r-body></div>

        <div class="reply-box clay-2" style="padding:var(--space-3); border-radius:var(--radius-lg)">
          <div class="field" style="margin-bottom:var(--space-2)">
            <label class="field__label" for="quick-reply">빠른 답장</label>
            <textarea class="textarea" id="quick-reply" rows="2" placeholder="답장을 입력하세요…"></textarea>
          </div>
          <div class="flex justify-between items-center gap-3">
            <span class="text-2xs text-subtle">Enter 로 줄바꿈 · 클릭으로 전송</span>
            <button class="btn btn-primary btn-sm" data-send-reply>
              <svg class="icon" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              보내기
            </button>
          </div>
        </div>
      </article>
    </section>

  </div>
</main>

<script>
  (function () {
    // ===== 메일 데이터 =====
    var emails = [
      {
        id: 1, sender: "디자인팀 · 윤서연", email: "seoyeon@clay.ui",
        avatar: "서", tone: "coral",
        subject: "클레이 키트 v2.3 디자인 검토 요청",
        preview: "새 버전 클레이 그림자 토큰과 캔디 컬러 램프를 정리했어요. 첨부 시안 확인 부탁드려요.",
        time: "오전 9:24", unread: true, starred: true, attach: true, pinned: true,

    var listEl = document.querySelector("[data-mail-list]");
    var emptyEl = document.querySelector("[data-reading-empty]");
    var readEl = document.querySelector("[data-reading]");
    var countEl = document.querySelector("[data-inbox-count]");

    var avatarMod = { coral: "avatar--coral", mint: "avatar--mint", sky: "avatar--sky", yellow: "avatar--yellow", violet: "" };

    function starSvg(on) {
      return '<svg class="icon ' + (on ? "icon-star-on" : "") + '" viewBox="0 0 24 24">' +
        '<polygon points="12 3 14.9 9 21.5 9.7 16.5 14.2 18 20.8 12 17.4 6 20.8 7.5 14.2 2.5 9.7 9.1 9"/></svg>';
    }
    function clipSvg() {
      return '<svg class="icon" viewBox="0 0 24 24"><path d="M21 11.5 12.5 20a5 5 0 0 1-7-7l8-8a3.3 3.3 0 0 1 4.7 4.7l-8 8a1.6 1.6 0 0 1-2.3-2.3l7.3-7.3"/></svg>';
    }
    function pinSvg() {
      return '<svg class="icon icon-pin" viewBox="0 0 24 24"><path d="M9 4h6l-1 6 3 3v2H7v-2l3-3-1-6Z"/><line x1="12" y1="15" x2="12" y2="21"/></svg>';
    }

    function makeItem(m) {
      var li = document.createElement("li");
      li.className = "list__item mail-item interactive" + (m.unread ? " is-unread" : "") + (m.pinned ? " is-pinned" : "");
      li.setAttribute("role", "option");
      li.setAttribute("aria-selected", "false");
      li.setAttribute("tabindex", "0");
      li.dataset.id = m.id;

      var metaIcons = "";
      if (m.pinned) metaIcons += pinSvg();
      if (m.starred) metaIcons += starSvg(true);
      if (m.attach) metaIcons += clipSvg();

      li.innerHTML =
        '<div class="avatar avatar--sm ' + (avatarMod[m.tone] || "") + '" aria-hidden="true">' + m.avatar + '</div>' +
        '<div class="list__main">' +
          '<div class="list__title">' +
            '<span class="unread-dot" aria-hidden="true"></span>' +
            '<span class="sender truncate flex-1">' + m.sender + '</span>' +
            '<span class="mail-meta-icons">' + metaIcons + '</span>' +
          '</div>' +
          '<div class="list__sub"><span class="subject">' + m.subject + '</span> · <span class="text-subtle truncate">' + m.preview + '</span></div>' +
        '</div>' +
        '<div class="list__meta"><span class="text-2xs text-subtle">' + m.time + '</span></div>';

      li.addEventListener("click", function () { selectEmail(m.id); });
      li.addEventListener("keydown", function (e) {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); selectEmail(m.id); }
      });
      return li;
    }

    // ===== 리스트 렌더 (고정 메일을 맨 위 별도 섹션으로) =====
    function renderList() {
      listEl.innerHTML = "";
      var pinned = emails.filter(function (m) { return m.pinned; });
      var rest = emails.filter(function (m) { return !m.pinned; });
      if (pinned.length) {
        var sec = document.createElement("li");
        sec.className = "mail-list__section";
        sec.setAttribute("role", "presentation");
        sec.innerHTML = pinSvg() + "<span>고정됨</span>";
        listEl.appendChild(sec);
        pinned.forEach(function (m) { listEl.appendChild(makeItem(m)); });
        var sec2 = document.createElement("li");
        sec2.className = "mail-list__section";
        sec2.setAttribute("role", "presentation");
        sec2.textContent = "받은편지함";
        listEl.appendChild(sec2);
      }
      rest.forEach(function (m) { listEl.appendChild(makeItem(m)); });
    }

    // ===== 빈 폴더 상태 — 말랑이가 안내 =====
    function renderEmptyFolder(title, text, expr, tone) {
      listEl.innerHTML =
        '<li class="mail-list-empty" role="presentation">' +
          '<div class="empty">' +
            '<figure class="mascot mascot--' + expr + ' mascot--' + tone + ' mascot--float" aria-hidden="true">' +
              '<span class="mascot__eye mascot__eye--l"></span><span class="mascot__eye mascot__eye--r"></span>' +
              '<span class="mascot__cheek mascot__cheek--l"></span><span class="mascot__cheek mascot__cheek--r"></span>' +
              '<span class="mascot__mouth"></span>' +
            '</figure>' +
            '<div class="empty__title">' + title + '</div>' +
            '<div class="empty__text">' + text + '</div>' +
          '</div>' +
        '</li>';
      // 리딩 페인을 빈 상태로 되돌린다
      emptyEl.style.display = "";
      readEl.hidden = true;
      document.body.removeAttribute("data-mail-view");
    }

    // ===== 폴더 전환 — 빈 폴더에서 empty state 시연 =====
    var folderLinks = document.querySelectorAll("[data-folder]");
    var emptyFolders = {
      sent:  ["보낸 메일이 없어요", "보낸 메일이 여기에 모여요.", "happy", "coral"],
      trash: ["휴지통이 비었어요", "삭제한 메일은 30일간 여기 머물러요.", "sleep", "yellow"]
    };
    Array.prototype.forEach.call(folderLinks, function (link) {
      link.addEventListener("click", function (e) {
        e.preventDefault();
        Array.prototype.forEach.call(folderLinks, function (l) { l.classList.remove("is-active"); });
        link.classList.add("is-active");
        var f = link.dataset.folder;
        if (emptyFolders[f]) {
          renderEmptyFolder.apply(null, emptyFolders[f]);
        } else {
          renderList();
        }
      });
    });

    function updateCount() {
      var n = emails.filter(function (m) { return m.unread; }).length;
      if (countEl) {
        countEl.textContent = n;
        countEl.style.display = n > 0 ? "" : "none";
      }
    }

    // ===== 메일 선택 =====
    function selectEmail(id) {
      var m = emails.find(function (e) { return e.id === id; });
      if (!m) return;

      // 선택 표시
      Array.prototype.forEach.call(listEl.children, function (li) {
        var on = li.dataset.id == id;
        li.classList.toggle("is-selected", on);
        if (li.getAttribute("role") === "option") li.setAttribute("aria-selected", String(on));
      });

      // 읽음 처리 + 카운트 감소
      if (m.unread) {
        m.unread = false;
        var li = listEl.querySelector('[data-id="' + id + '"]');
        if (li) li.classList.remove("is-unread");
        updateCount();
      }

      // 리딩 페인 채우기
      readEl.querySelector("[data-r-subject]").textContent = m.subject;
      readEl.querySelector("[data-r-sender]").textContent = m.sender;
      readEl.querySelector("[data-r-email]").textContent = m.email;
      readEl.querySelector("[data-r-time]").textContent = m.time;
      var av = readEl.querySelector("[data-r-avatar]");
      av.textContent = m.avatar;
      av.className = "avatar " + (avatarMod[m.tone] || "");

      var bodyHtml = m.body.map(function (p) { return "<p>" + p + "</p>"; }).join("");
      readEl.querySelector("[data-r-body]").innerHTML = bodyHtml;

      emptyEl.style.display = "none";
      readEl.hidden = false;

      document.body.setAttribute("data-mail-view", "reading");
    }

    // ===== 모바일 뒤로가기 =====
    var backBtn = document.querySelector("[data-mail-back]");
    if (backBtn) {
      backBtn.addEventListener("click", function () {
        document.body.removeAttribute("data-mail-view");
      });
    }

    // ===== 빠른 답장 전송 =====
    var sendBtn = document.querySelector("[data-send-reply]");
    if (sendBtn) {
      sendBtn.addEventListener("click", function () {
        var ta = document.getElementById("quick-reply");
        if (window.Clay && typeof window.Clay.toast === "function") {
          window.Clay.toast({ title: "전송됨", text: "답장을 보냈어요.", variant: "success" });
        }
        if (ta) ta.value = "";
      });
    }

    // ===== 전체 선택 체크박스 =====
    var selectAll = document.querySelector("[data-select-all]");
    if (selectAll) {
      selectAll.addEventListener("change", function () {
        Array.prototype.forEach.call(listEl.children, function (li) {
          if (li.dataset.id) li.classList.toggle("is-selected", selectAll.checked);
        });
      });
    }

    renderList();
    updateCount();
  })();
</script>
