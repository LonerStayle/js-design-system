<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>404 · 페이지를 찾을 수 없어요 · Gradient Mesh Modern</title>
<script>
  /* FOUC guard — set the theme before first paint (key matches app.js) */
  (function () {
    try {
      var t = localStorage.getItem("gmm-theme");
      if (!t) t = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      document.documentElement.setAttribute("data-theme", t);
    } catch (e) {}
  })();
</script>
<link rel="stylesheet" href="../tokens.css" />
<link rel="stylesheet" href="../semantic.css" />
<link rel="stylesheet" href="../base.css" />
<link rel="stylesheet" href="../components/index.css" />
<style>
  /* Single-scene 404 — the ambient mesh "swallows" the missing page.
     Foreground blobs drift away from the pointer (parallax), and the giant
     404 numeral leans opposite. All decorative, aria-hidden, reduced-motion safe. */
  .err { position: relative; min-height: calc(100dvh - var(--navbar-h)); display: grid; place-items: center;
    padding: var(--space-10) var(--space-6); text-align: center; overflow: clip; }
  .err__scene { position: relative; z-index: 2; max-width: 560px; }
  .err__eyebrow { display: inline-flex; align-items: center; gap: var(--space-2); padding: 4px var(--space-4);
    border-radius: var(--radius-full); background: var(--color-surface); border: var(--border-1) solid var(--color-border);
    box-shadow: var(--shadow-sm); font-size: var(--text-sm); font-weight: var(--weight-semibold); color: var(--color-text-muted); }
  .err__eyebrow .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gradient-warm); box-shadow: 0 0 0 4px var(--color-danger-weak); }
  .err__code { font-family: var(--font-display); font-weight: 800; font-size: clamp(6.5rem, 26vw, 17rem);
    line-height: 0.86; letter-spacing: -0.03em; margin: var(--space-4) 0 var(--space-2); will-change: transform; }
  .err h1 { margin-bottom: var(--space-4); }
  .err__lead { max-width: 42ch; margin: 0 auto var(--space-8); }
  .err__cta { display: flex; gap: var(--space-3); flex-wrap: wrap; justify-content: center; }
  .err__quick { margin-top: var(--space-9); display: flex; gap: var(--space-2) var(--space-5); flex-wrap: wrap;
    justify-content: center; align-items: center; font-size: var(--text-sm); color: var(--color-text-subtle); }
  .err__quick a { color: var(--color-text-muted); font-weight: var(--weight-semibold); display: inline-flex; align-items: center; gap: 6px; }
  .err__quick a:hover { color: var(--color-primary-solid); }
  .err__quick a svg { width: 15px; height: 15px; }

  /* Foreground drifting blobs */
  .err__blobs { position: absolute; inset: 0; z-index: 0; overflow: clip; }
  .err__blob { position: absolute; border-radius: 50%; filter: blur(3px) saturate(1.12); opacity: 0.85;
    will-change: transform; transition: transform 0.5s var(--ease-out); }
  .err__blob--1 { width: 340px; height: 340px; top: 4%; left: 4%;
    background: radial-gradient(circle at 32% 30%, var(--mesh-blob-1), transparent 68%), var(--gradient-vivid); }
  .err__blob--2 { width: 260px; height: 260px; bottom: 6%; right: 6%;
    background: radial-gradient(circle at 60% 40%, var(--mesh-blob-4), transparent 66%), var(--gradient-accent); }
  .err__blob--3 { width: 200px; height: 200px; bottom: 14%; left: 12%;
    background: radial-gradient(circle at 40% 50%, var(--mesh-blob-3), transparent 66%), var(--gradient-warm); opacity: 0.7; }
  @media (prefers-reduced-motion: reduce) { .err__blob { transition: none; } }

  @media (max-width: 560px) {
    .err__blob--1 { width: 220px; height: 220px; }
    .err__blob--2 { width: 170px; height: 170px; }
    .err__blob--3 { display: none; }
  }
</style>
</head>
<body class="mesh-grain" data-mood="twilight">
<a href="#main" class="skip-link">본문으로 건너뛰기</a>

<header class="navbar">
  <a href="../index.html" class="navbar__brand">
    <span class="navbar__logo" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="9" r="5"/><circle cx="16" cy="15" r="5"/></svg></span>
    Mesh<span class="brand-accent">UI</span>
  </a>
  <span class="navbar__spacer"></span>
  <button class="btn btn--icon btn--ghost" data-theme-toggle aria-label="다크 모드 전환" aria-pressed="false" title="테마 전환"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg></button>
  <a class="btn btn--primary" href="dashboard.html">대시보드로</a>
</header>

<main id="main">
  <section class="err">
    <div class="err__blobs" aria-hidden="true">
      <span class="err__blob err__blob--1"></span>
      <span class="err__blob err__blob--2"></span>
      <span class="err__blob err__blob--3"></span>
    </div>
    <div class="err__scene" data-reveal>
      <span class="err__eyebrow"><span class="dot"></span> 404 · 페이지를 찾을 수 없어요</span>
      <div class="err__code text-gradient">404</div>
      <h1>메시 속으로 흘러간 페이지</h1>
      <p class="lead err__lead">찾으시던 주소가 배경 그라디언트 사이로 미끄러져 사라졌어요. 아래에서 바로 원하는 곳으로 이동할 수 있습니다.</p>
      <div class="err__cta">
        <a href="../index.html" class="btn btn--primary btn--lg"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg> 홈으로 돌아가기</a>
        <button class="btn btn--outline btn--lg" data-cmdk><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg> 검색 <kbd style="margin-left:2px">⌘K</kbd></button>
      </div>
      <nav class="err__quick" aria-label="빠른 이동">
        <span>이런 곳은 어때요?</span>
        <a href="dashboard.html">대시보드<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></a>
        <a href="inbox.html">받은편지함<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></a>
        <a href="pricing.html">요금제<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></a>
      </nav>
    </div>
  </section>
</main>

<script src="../app.js"></script>
<script>
  /* Pointer-repelled blobs + a subtly leaning numeral. Skipped when the user
     prefers reduced motion or has frozen the ambient mesh (data-motion="off"). */
  (function () {
    var reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduce) return;
    var scene = document.querySelector(".err");
    var code = document.querySelector(".err__code");
    var blobs = Array.prototype.slice.call(document.querySelectorAll(".err__blob"));
    if (!scene || !blobs.length) return;
    var depths = [34, -26, 22];
    var raf = null, nx = 0, ny = 0;
    function apply() {
      raf = null;
      if (document.documentElement.dataset.motion === "off") return;
      blobs.forEach(function (b, i) {
        var d = depths[i] || 20;
        b.style.transform = "translate(" + (-nx * d) + "px," + (-ny * d) + "px)";
      });
      if (code) code.style.transform = "translate(" + (nx * 10) + "px," + (ny * 8) + "px)";
    }
    scene.addEventListener("pointermove", function (e) {
      var r = scene.getBoundingClientRect();
      nx = (e.clientX - r.left) / r.width - 0.5;
      ny = (e.clientY - r.top) / r.height - 0.5;
      if (!raf) raf = requestAnimationFrame(apply);
    });
    scene.addEventListener("pointerleave", function () {
      blobs.forEach(function (b) { b.style.transform = ""; });
      if (code) code.style.transform = "";
    });
  })();
</script>
</body>
</html>
