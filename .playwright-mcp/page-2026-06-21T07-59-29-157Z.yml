        - heading "A System Set in Lead, Built for the Screen." [level=2] [ref=e41]:
          - text: A System Set in
          - emphasis [ref=e42]: Lead
          - text: ", Built for the Screen."
        - paragraph [ref=e43]: Authority, density, and the discipline of the printed page — translated into tokens, rules, and components that render anywhere a browser does.
        - generic [ref=e44]:
          - paragraph [ref=e45]:
            - text: "The Ledger is what happens when a newsroom style guide meets a modern component library. Every measure is deliberate: warm newsprint stock at"
            - code [ref=e46]: "#F1ECE3"
            - text: ", carbon ink at"
            - code [ref=e47]: "#16130F"
            - text: ", and a single editorial red —"
            - code [ref=e48]: "#B81E1E"
            - text: — reserved for the masthead flourish and the breaking band.
          - paragraph [ref=e49]: "Nothing is rounded. Boxes give way to rules: heavy horizontal rules cap each section, hairline column rules divide the type. Headlines are set condensed and tight; body copy runs justified with hyphenation, the way a column of newsprint actually sets. It is dense on purpose — information is the luxury here, not whitespace."
          - paragraph [ref=e50]: Below you will find the raw token ramps, the full component gallery, both editions — Day and Night — and ten production demo pages assembled from these parts. Press ⌘K at any time to thumb through the paper.
