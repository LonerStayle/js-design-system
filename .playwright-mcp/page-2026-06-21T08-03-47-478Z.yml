      - generic [ref=e211]:
        - generic [ref=e212]:
          - heading "Questions at the Desk" [level=2] [ref=e213]
          - generic [ref=e214]: Subscriptions & billing
        - generic [ref=e215]:
          - generic [ref=e216]:
            - button "How does monthly versus annual billing work?" [ref=e217] [cursor=pointer]:
              - generic [ref=e218]: How does monthly versus annual billing work?
            - paragraph [ref=e221]: Monthly plans bill on the same date each month and you can stop any time. Annual plans bill once for the year and carry a standing 20% discount — Press works out to $7.16 a month, and a Newsroom of five seats lands at $278 for the year. Switching between the two takes effect on your next renewal.
          - generic [ref=e222]:
            - button "Can I cancel, and what happens to my access?" [ref=e223] [cursor=pointer]:
              - generic [ref=e224]: Can I cancel, and what happens to my access?
            - paragraph [ref=e227]: Yes — cancel from your account at any time, no call required. Your subscription stays active until the end of the period you have already paid for, then quietly drops back to the free Reader plan. Nothing is deleted; your saved clippings stay put.
          - generic [ref=e228]:
            - button "How do team seats work on Newsroom?" [ref=e229] [cursor=pointer]:
              - generic [ref=e230]: How do team seats work on Newsroom?
            - paragraph [ref=e233]: Newsroom includes five seats out of the box. Add more for $5 per seat per month (or the annual equivalent), and remove them whenever the desk shrinks. Each member gets their own login while sharing the archive vault, clippings, and a single invoice.
          - generic [ref=e234]:
            - button "Do you offer refunds?" [ref=e235] [cursor=pointer]:
              - generic [ref=e236]: Do you offer refunds?
            - paragraph [ref=e239]: If an annual plan is not for you, write to the circulation desk within 14 days of payment and we will refund it in full. Monthly plans are not pro-rated, but cancelling stops the next charge immediately — so you are never billed for a month you did not intend to read.
          - generic [ref=e240]:
            - button "Are there student or press discounts?" [ref=e241] [cursor=pointer]:
              - generic [ref=e242]: Are there student or press discounts?
            - paragraph [ref=e245]: Students with a valid .edu address and credentialed journalists both qualify for 50% off the Press plan. Send proof to the desk and we will apply the rate to your account within one business day. Newsroom volume pricing is available above 25 seats.
