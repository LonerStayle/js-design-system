            - generic [ref=e201]:
              - generic [ref=e203]: MR
              - generic [ref=e205]:
                - generic [ref=e206]:
                  - text: From
                  - strong [ref=e207]: Margaret Reyes
                  - text: <m.reyes@ledger.press>
                - generic [ref=e208]: "To: City Desk, Copydesk · Today · 4:18 a.m."
          - separator [ref=e209]
          - generic [ref=e210]:
            - paragraph [ref=e211]: Filed the wrap from the press gallery a few minutes after the clerk read the roll. The count held at 58–41, which is wider than the floor whip suggested last night, so we should lead with the margin rather than the procedural drama. I have the majority leader on the record outside the chamber, and a usable line from the ranking member of the opposition for balance.
            - paragraph [ref=e212]: The one soft spot is the timeline graf. Leadership is promising a signature "within the week," but two staffers told me privately the implementation clock does not start until the next fiscal year. I have hedged the language — please give it a second read before A1 closes so we are not overstating the speed.
            - paragraph [ref=e213]: Photo desk has three frames from the final hour of debate; Dele is sending crops separately. I would run the chamber-floor frame above the fold and hold the leader's portrait for the jump on A6. The pull quote — "this is what the institution looks like when it works" — is clean and verified against my recorder.
            - paragraph [ref=e214]: "One housekeeping note: the moderate bloc that revived the bill after it died in committee deserves a sidebar of its own. I can turn 12 inches by the morning budget if the desk wants it. Let me know on the 9 o'clock call."
            - paragraph [ref=e215]: Sending the raw audio to the shared drive now. Holler if you need anything before the late plates lock.
            - paragraph [ref=e216]: — Margaret
