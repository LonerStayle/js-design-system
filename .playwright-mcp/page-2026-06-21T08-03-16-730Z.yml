            - paragraph [ref=e132]: There is a particular satisfaction in a sheet of paper that remembers it was pressed. Run your thumb across the surface of the Letterpress Wall Print and you will feel the type bite — the gentle debossment that no inkjet can fake, the small irregularities that mark each pull as a separate, deliberate act.
            - paragraph [ref=e133]: Each impression begins on a Vandercook proofing press built in 1962, fed one sheet at a time. The forme is locked with hand-set metal type and photopolymer plates, inked in a single warm black, and pulled at a pressure tuned by ear and eye over a long afternoon. By the end of a run no two sheets are truly identical, and that is the point.
            - paragraph [ref=e134]: A Page About Pages
            - paragraph [ref=e135]: "The composition is a quiet tribute to the daily of record: a heavy banner rule, a condensed nameplate, and a column of body text justified and hyphenated the old way. Hung on a wall, it reads less like decoration and more like an editorial — an argument, set in lead, for doing the slow thing well."
            - paragraph [ref=e136]: It pairs naturally above a desk, beside a bookshelf, or in the narrow space a smaller print was always meant to fill. The soft-white cotton stock holds its color for decades and frames cleanly without glare. Continued in Specifications →
